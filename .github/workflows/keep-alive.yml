ame: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl "https://ucdnbzlznkssttcawhqi.supabase.co/rest/v1/recipes?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"